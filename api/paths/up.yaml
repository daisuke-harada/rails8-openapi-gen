get:
  tags: ["health"]
  operationId: up
  summary: "Health check"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthOkResponse"
components:
  schemas:
    HealthOkResponse:
      type: object
      properties:
        message:
          type: string
          example: "I'm up!"
        test:
          type: integer
          example: 123
