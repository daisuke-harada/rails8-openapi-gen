get:
  tags: ["health"]
  operationId: up
  summary: "Health check"
  responses:
    "200":
      $ref: "#/components/schemas/HealthOkResponse"

components:
  schemas:
    HealthOkResponse:
      type: object
      properties:
        message:
          type: string
          example: "I'm up!"
        test:
          type: integer
          example: 123
